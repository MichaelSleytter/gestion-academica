# ============================================
# SERVIDOR
# ============================================
server.port=8080

# ============================================
# BASE DE DATOS - MySQL
# Conecta a la BD existente (no la crea)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_academica_universitaria?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=none

# Mostrar SQL generado en consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================
# LOGS
# ============================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.gestionacademica=INFO

# Evita error de referencias circulares en entidades JPA expuestas en Swagger
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

