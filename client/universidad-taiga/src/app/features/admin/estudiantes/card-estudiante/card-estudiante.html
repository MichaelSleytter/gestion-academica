<article
  class="group relative w-full max-w-full overflow-hidden rounded-2xl border border-border bg-surface shadow-sm transition-shadow duration-200 hover:shadow-md"
  [attr.aria-label]="'Tarjeta del estudiante ' + estudiante().nombre"
>
  <div class="h-24">
    <img
      class="h-55 w-full mx-auto"
      src="/ilustraciones/Project-planning.svg"
      alt=""
      aria-hidden="true"
    />
  </div>

  <div
    class="absolute right-4 top-4 inline-flex items-center gap-1 opacity-80"
  >
    <button
      appearance="action"
      iconStart="@tui.pencil"
      size="s"
      tuiIconButton
      type="button"
      aria-label="Editar estudiante"
      (click)="onEditar()"
    ></button>
    <button
      appearance="action"
      iconStart="@tui.trash-2"
      size="s"
      tuiIconButton
      type="button"
      aria-label="Eliminar estudiante"
      (click)="onEliminar()"
    ></button>
    <button
      appearance="action"
      iconStart="@tui.history"
      size="s"
      tuiIconButton
      type="button"
      aria-label="Ver historial"
      (click)="onVerHistorial()"
    ></button>
  </div>

  <div class="absolute left-5 top-14">
    <div
      class="size-20 overflow-hidden rounded-2xl border-4 border-surface bg-surface shadow-lg"
      [attr.aria-label]="'Avatar de ' + estudiante().nombre"
    >
      <div
        class="flex size-full items-center justify-center bg-surface-hover text-lg font-bold text-text-secondary"
      >
        {{ iniciales() }}
      </div>
    </div>
  </div>

  <div class="flex flex-col gap-4 px-5 pb-5 pt-13">
    <header class="space-y-1">
      <h3 class="text-lg font-bold leading-6 text-text-primary">{{ estudiante().nombre }}</h3>
      <p class="text-sm font-medium tracking-wide text-text-secondary">
        {{ estudiante().codigoEstudiante }}
      </p>
    </header>

    <div class="space-y-2.5 text-text-secondary">
      <div class="flex items-center gap-2.5 text-xs">
        <tui-icon
          icon="@tui.mail"
          class="text-text-muted"
          [style.width.px]="16"
          [style.height.px]="16"
          aria-hidden="true"
        />
        <span class="truncate">{{ estudiante().email }}</span>
      </div>

      <div class="flex items-center gap-2.5 text-sm font-medium">
        <tui-icon
          icon="@tui.book-open"
          class="text-text-muted"
          [style.width.px]="16"
          [style.height.px]="16"
          aria-hidden="true"
        />
        <span class="truncate">{{ estudiante().nombreCarrera }}</span>
      </div>
    </div>

    <div class="flex items-center justify-between border-t border-border pt-2.5">
      <div class="flex items-center gap-2">
        <span
          class="inline-flex size-8 items-center justify-center rounded-xl bg-surface-hover text-sm font-bold text-text-secondary"
        >
          {{ estudiante().ciclo }}
        </span>
        <span class="text-xs font-medium text-text-secondary">Ciclo</span>
      </div>

      <span
        class="inline-flex items-center rounded-xl px-2.5 py-1 text-xs font-bold tracking-[0.03em]"
        [class]="estado().clases"
      >
        {{ estado().etiqueta }}
      </span>
    </div>

    <button
      appearance="secondary"
      iconStart="@tui.history"
      size="m"
      tuiButton
      type="button"
      class="btn-historial"
      aria-label="Ver historial académico"
      (click)="onVerHistorial()"
    >
      Ver Historial
    </button>
  </div>
</article>
