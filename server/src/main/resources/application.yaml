# ============================================
# SERVIDOR
# ============================================
server:
  port: ${PORT_BACKEND:8080}
  forward-headers-strategy: framework

# ============================================
# CONGIGURACIÓN DE .env
# ============================================
# Importa variables desde un fichero .env (key=value)
spring:
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./src/.env[.properties]

  # ============================================
  # BASE DE DATOS - PostgreSQL
  # Conecta a la BD existente con las siguientes credenciales:
  # ============================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ============================================
  # FLYWAY — Database Migrations
  # ============================================
  flyway:
    enabled: true
    # Baseline existing schema so Flyway doesn't fail on non-empty DB
    baseline-on-migrate: true
    baseline-version: 0
    # Location of migration SQL files
    locations: classpath:db/migration
    # Fail fast if migration checksums change
    validate-on-migrate: true

  # ============================================
  # JPA / HIBERNATE
  # ============================================
  jpa:
    hibernate:
      # Validate that JPA entities match the DB schema managed by Flyway
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuración Jackson
  jackson:
    default-property-inclusion: NON_NULL
    serialization:
      FAIL_ON_EMPTY_BEANS: false

  # ============================================
  # Java Mail (para enviar correos electrónicos)
  # ============================================
  mail:
    host: smtp.resend.com
    port: 587
    username: resend
    password: ${RESEND_API_KEY}
    from: ${MAIL_FROM:onboarding@resend.dev}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    cors:
      enabled: true

# ============================================
# LOGS
# ============================================
logging:
  level:
    org.hibernate.SQL: DEBUG
    com.example.gestionacademica: INFO
# ============================================
# CORS
# ============================================
app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
  student:
    email:
      domain: ${STUDENT_EMAIL_DOMAIN:institution.edu.pe}
  password-reset:
    # Minutos de validez del token de recuperación de contraseña
    expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:30}
  # URL base del frontend (Angular) usada para construir enlaces de reset
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}

# ============================================
# JWT CONFIGURATION
# ============================================
# Clave secreta para firmar tokens JWT
# En producción: usa una clave de mínimo 256 bits
# Genera una con: openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET:miSuperSecretKeyQueDebeSerMuyLargaYSeguraParaProduccion2024!}
  # Tiempo de expiración del Access Token en milisegundos
  # 15 minutos = 15 * 60 * 1000 = 900000 ms
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  # Tiempo de expiración del Refresh Token en días
  refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
